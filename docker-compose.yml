version: '3.8'
services:
  mongo:
    image: mongo:6
    container_name: tienda-ropa-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  mongo-express:
    image: mongo-express:1.0.2
    container_name: tienda-ropa-me
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017/tienda_ropa
    depends_on:
      - mongo
volumes:
  mongo_data:

version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - CLIENT_ORIGIN=http://localhost:5173
      - JWT_SECRET=please_change_me
      - UPLOAD_DIR=/app/uploads
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - STRIPE_SECRET_KEY
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
volumes:
  backend_data:
  backend_uploads:
