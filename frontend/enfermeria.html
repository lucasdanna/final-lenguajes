<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enfermería - Club Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 min-h-screen">
  <header class="bg-gray-900 text-white shadow">
    <nav class="container mx-auto p-4">
      <div class="flex items-center justify-between">
        <a href="index.html" class="hover:underline">← Inicio</a>
        <h1 class="text-2xl font-bold">🏥 Enfermería</h1>
      </div>
    </nav>
  </header>
  <main class="container mx-auto p-6">
    <p class="text-gray-600 mb-4">Vista estática de estado físico (placeholder). La gestión completa vive en el backend PHP.</p>
    <div id="medicalList" class="space-y-3"></div>
  </main>
  <script>
    // Placeholder: show last fixtures as sample timeline
    fetch('/api/home.php')
      .then(r=>r.json())
      .then(({top_scorers})=>{
        const el = document.getElementById('medicalList');
        const players = top_scorers||[];
        if(players.length===0){ el.innerHTML = '<p class="text-gray-500">Sin datos.</p>'; return; }
        el.innerHTML = players.map(p=>`
          <div class="border rounded p-3 bg-white">
            <div class="font-semibold">${p.name}</div>
            <div class="text-sm text-gray-600">${p.position} ${p.nationality?('• '+p.nationality):''}</div>
            <div class="text-xs text-gray-500">Estado: Disponible</div>
          </div>
        `).join('');
      });
  </script>
</body>
</html>
