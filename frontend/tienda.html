<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tienda - Club Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 min-h-screen">
  <header class="bg-gray-900 text-white shadow">
    <nav class="container mx-auto p-4">
      <div class="flex items-center justify-between">
        <a href="index.html" class="hover:underline">← Inicio</a>
        <h1 class="text-2xl font-bold">🛍️ Tienda</h1>
      </div>
    </nav>
  </header>
  <main class="container mx-auto p-6">
    <div id="storeGrid" class="grid md:grid-cols-3 gap-6"></div>
  </main>
  <script>
    fetch('/api/home.php')
      .then(r=>r.json())
      .then(({merch_latest})=>{
        const el = document.getElementById('storeGrid');
        if(!merch_latest||merch_latest.length===0){ el.innerHTML = '<p class="text-gray-500">Sin productos.</p>'; return; }
        el.innerHTML = merch_latest.map(m=>`
          <div class="bg-white rounded-2xl shadow p-4">
            <img class="w-full h-40 object-cover rounded-xl mb-3" src="${m.image_url||'https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=800&h=400&fit=crop'}" alt="Producto">
            <h3 class="font-bold text-lg mb-2">${m.name}</h3>
            <div class="text-gray-600 mb-2">
              <div class="text-sm text-gray-500">${m.category}</div>
              <div class="text-xl font-bold text-green-600">$${Number(m.price).toFixed(2)}</div>
            </div>
            <button class="bg-blue-600 text-white rounded px-3 py-2">Añadir</button>
          </div>
        `).join('');
      });
  </script>
</body>
</html>
